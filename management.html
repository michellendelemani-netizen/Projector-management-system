<!DOCTYPE html>
<html>
<head>
  <title>Manager Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 >Welcome Manager</h1>

<div class="dashboard">



  <!-- Alerts -->
  <div class="box alerts">
    <h3>⚠ Alerts</h3>
    <p>3 Projectors overdue</p>
    <p>1 Damaged unit</p>
  </div>

  <!-- Insights -->
  <div class="box insights">
    <h3>📊 Insights</h3>
    <p>Most used: Epson X200</p>
    <p>Least used: Samsung 99432</p>
  </div>

  <!-- What's New -->
  <div class="box news">
    <h3>🆕 What's New</h3>
    <p>2 new projectors added</p>
  </div>
    <!-- Summary Cards -->
  <div class="card">Total Projectors <br><b>20</b></div>
  <div class="card">Available <br><b>12</b></div>
  <div class="card">Borrowed <br><b>6</b></div>
  <div class="card">Damaged <br><b>2</b></div>

</div>

</body>
</html>
